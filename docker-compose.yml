# ==========================================================================
#  Frappe ERP Stack – éles (production) Docker Compose
#
#  Ez egy template. Másold le, állítsd be a .env fájlt,
#  majd: docker compose up -d
#
#  Részletes dokumentáció: lásd README.md
# ==========================================================================

x-image: &image
  image: ${IMAGE:-ghcr.io/szricsi0917/frappe-erp-stack}:${TAG:-v16}

services:

  db:
    image: mariadb:11.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-2G}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ${DB_DIR:-./data/db}:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    # A cache adat múlékony, szándékosan nincs volume.

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - ${REDIS_QUEUE_DIR:-./data/redis-queue}:/data

  configurator:
    <<: *image
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
      - >
        if [ ! -f sites/common_site_config.json ]; then echo "{}" > sites/common_site_config.json; fi;
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs

  # Idempotens site-bootstrap: ha a site nem létezik, létrehozza;
  # majd biztosítja, hogy minden, az image-en lévő app telepítve legyen,
  # végül lefuttat egy `bench migrate`-et.
  create-site:
    <<: *image
    restart: "no"
    depends_on:
      configurator:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        if [ ! -f "sites/$$SITE_NAME/site_config.json" ]; then
          echo ">>> Új site létrehozása és ERPNext telepítése: $$SITE_NAME"
          bench new-site "$$SITE_NAME" \
            --mariadb-user-host-login-scope='%' \
            --db-root-username=root \
            --db-root-password="$$ROOT_PASS" \
            --admin-password="$$ADMIN_PASS" \
            --install-app erpnext \
            --set-default
        else
          echo ">>> A site már létezik: $$SITE_NAME (létrehozás kihagyva)"
        fi

        echo ">>> Hiányzó appok telepítése"
        INSTALLED=$$(bench --site "$$SITE_NAME" list-apps 2>/dev/null || true)
        for app in hrms helpdesk insights builder wiki lms gameplan print_designer crm; do
          if echo "$$INSTALLED" | grep -qw "$$app"; then
            echo "  - $$app: már telepítve, kihagyás"
          else
            echo "  - $$app: telepítés..."
            bench --site "$$SITE_NAME" install-app "$$app" || echo "  ! $$app telepítés sikertelen, folytatás"
          fi
        done

        echo ">>> Migráció futtatása"
        bench --site "$$SITE_NAME" migrate
        echo ">>> Kész."
    environment:
      SITE_NAME: ${SITE_NAME}
      ROOT_PASS: ${DB_PASSWORD}
      ADMIN_PASS: ${ADMIN_PASSWORD}
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs

  backend:
    <<: *image
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    environment:
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs
      - ${UPLOADS_PUBLIC_DIR:-./data/uploads/public}:/home/frappe/frappe-bench/sites/${SITE_NAME}/public/files
      - ${UPLOADS_PRIVATE_DIR:-./data/uploads/private}:/home/frappe/frappe-bench/sites/${SITE_NAME}/private/files

  websocket:
    <<: *image
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs

  frontend:
    <<: *image
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME}
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-100m}
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs
      - ${UPLOADS_PUBLIC_DIR:-./data/uploads/public}:/home/frappe/frappe-bench/sites/${SITE_NAME}/public/files
      - ${UPLOADS_PRIVATE_DIR:-./data/uploads/private}:/home/frappe/frappe-bench/sites/${SITE_NAME}/private/files
    ports:
      - "${HTTP_PORT:-8080}:8080"

  queue-long:
    <<: *image
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs
      - ${UPLOADS_PUBLIC_DIR:-./data/uploads/public}:/home/frappe/frappe-bench/sites/${SITE_NAME}/public/files
      - ${UPLOADS_PRIVATE_DIR:-./data/uploads/private}:/home/frappe/frappe-bench/sites/${SITE_NAME}/private/files

  queue-short:
    <<: *image
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs
      - ${UPLOADS_PUBLIC_DIR:-./data/uploads/public}:/home/frappe/frappe-bench/sites/${SITE_NAME}/public/files
      - ${UPLOADS_PRIVATE_DIR:-./data/uploads/private}:/home/frappe/frappe-bench/sites/${SITE_NAME}/private/files

  scheduler:
    <<: *image
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command: ["bench", "schedule"]
    volumes:
      - ${SITES_DIR:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${LOGS_DIR:-./data/logs}:/home/frappe/frappe-bench/logs
      - ${UPLOADS_PUBLIC_DIR:-./data/uploads/public}:/home/frappe/frappe-bench/sites/${SITE_NAME}/public/files
      - ${UPLOADS_PRIVATE_DIR:-./data/uploads/private}:/home/frappe/frappe-bench/sites/${SITE_NAME}/private/files
